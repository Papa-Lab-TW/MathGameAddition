<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大砲算術塔防 - V2.2</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-red: #ff4757;
            --ui-bg: #2f3542;
            --cannon-color: #3d3d3d;
            --missile-active: #ff4757;
            --missile-inactive: #57606f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        
        body {
            background: #111;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: "Microsoft JhengHei", sans-serif;
            margin: 0; 
        }

        /* 外層縮放容器 */
        #scale-container {
            width: 1280px; height: 720px;
            min-width: 1280px; min-height: 720px;
            flex-shrink: 0; 
            transform-origin: center center;
            position: relative;
        }

        /* 內層遊戲容器 */
        #game-wrapper {
            width: 100%; height: 100%;
            background: #000; display: flex;
            position: relative; overflow: hidden;
        }

        @keyframes softShake {
            0% { transform: translate(0px, 0px); }
            25% { transform: translate(1px, 0.5px); }
            50% { transform: translate(-0.5px, 1px); }
            75% { transform: translate(-1px, -0.5px); }
            100% { transform: translate(0px, 0px); }
        }
        .shake-effect { animation: softShake 0.12s linear infinite; }

        /* 遊戲覆蓋視窗 */
        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 3000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .overlay-title { font-size: 80px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .overlay-text { font-size: 36px; margin-bottom: 40px; color: #bdc3c7; }
        
        .mode-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 700px; max-width: 90%;
        }
        .mode-btn {
            padding: 20px; font-size: 32px; font-weight: bold;
            border: none; border-radius: 15px; cursor: pointer; color: white; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .mode-btn.add { background: #2ecc71; } 
        .mode-btn.sub { background: #3498db; } 
        .mode-btn.inf { background: #9b59b6; grid-column: span 2; font-size: 36px; } 
        .mode-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        
        .big-btn {
            width: 400px; padding: 20px; font-size: 36px; font-weight: bold;
            border: none; border-radius: 20px; cursor: pointer; background: #57606f; color: white; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); margin-top: 20px;
        }
        .big-btn.primary { background: #2ecc71; }
        .big-btn.danger { background: #e74c3c; }
        .big-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        #sys-buttons { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 4000; }
        .icon-btn { width: 52px; height: 52px; background: rgba(0,0,0,0.6); border: 2px solid white; border-radius: 12px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .icon-btn:hover { background: rgba(255,255,255,0.2); }
        .icon-btn svg { width: 32px; height: 32px; fill: white; }

        #score-board { position: absolute; top: 20px; left: 180px; background: rgba(0,0,0,0.85); color: #f1c40f; padding: 12px 35px; border-radius: 40px; font-size: 44px; z-index: 100; font-weight: 900; border: 3px solid #f1c40f; box-shadow: 0 0 25px rgba(241,196,15,0.4); letter-spacing: 3px; }
        
        #battle-scene { width: 75%; height: 100%; background: url('background.png') no-repeat center center/cover; position: relative; border-right: 6px solid #1e272e; }
        #ui-side-panel { width: 25%; height: 100%; background: var(--ui-bg); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; color: white; z-index: 20; }
        #question-display { font-size: 85px; font-weight: bold; color: #fff; margin-bottom: 30px; }
        .options-list { display: flex; flex-direction: column; gap: 16px; width: 100%; }
        .opt-btn { width: 100%; height: 85px; font-size: 44px; border: none; border-radius: 16px; background: #57606f; color: white; cursor: pointer; font-weight: bold; }
        
        #controls-layout { position: absolute; left: 30px; bottom: 30px; z-index: 50; display: flex; align-items: flex-end; gap: 60px; }
        #fire-group { position: relative; }
        #fire-btn { width: 140px; height: 140px; border-radius: 50%; background: var(--primary-red); border: 8px solid #fff; color: white; font-size: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 8px 0 #a40000; }
        #bullet-info-badge { position: absolute; left: 50%; bottom: 180px; transform: translateX(-50%); background: rgba(0,0,0,0.88); color: #f1c40f; border: 2px solid #f1c40f; padding: 10px 22px; border-radius: 15px; font-size: 42px; font-weight: 900; display: flex; align-items: center; gap: 12px; z-index: 100;}
        .bullet-icon { width: 16px; height: 30px; background: #f1c40f; border-radius: 8px 8px 2px 2px; }

        #missile-area { position: relative; width: 120px; height: 120px; }
        #missile-btn { width: 110px; height: 110px; border-radius: 50%; border: 4px solid #fff; background: var(--missile-inactive); cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        #missile-btn.ready { background: #2f3542; border-color: #2ecc71; box-shadow: 0 0 25px #2ecc71; animation: simplePulse 1.2s infinite; }
        @keyframes simplePulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        #charge-dots { position: absolute; right: -55px; top: 0; height: 100%; width: 40px; pointer-events: none; }
        .dot { position: absolute; width: 16px; height: 16px; background: #333; border-radius: 50%; border: 1px solid #555; transition: 0.3s; }

        .big-missile { position: absolute; width: 120px; height: 46px; background: #ff4757; border-radius: 6px 45px 45px 6px; box-shadow: 0 0 35px #ff4757; z-index: 200; border: 3px solid white; transform-origin: center center; }
        .big-missile::before { content: ''; position: absolute; left: -12px; top: -12px; width: 22px; height: 70px; background: #c0392b; border-radius: 4px; z-index: -1; }
        .big-missile::after { content: ''; position: absolute; left: -55px; top: 13px; width: 55px; height: 20px; background: linear-gradient(to right, transparent, #f1c40f, #e67e22); border-radius: 50% 0 0 50%; filter: blur(2px); animation: thrust 0.1s infinite alternate; }
        @keyframes thrust { from { width: 45px; opacity: 0.8; } to { width: 65px; opacity: 1; } }

        .wall { position: absolute; left: 0; top: 0; width: 140px; height: 100%; z-index: 8; }
        #cannon-container { position: absolute; left: 280px; top: 220px; width: 100px; height: 100px; z-index: 10; }
        #cannon-barrel { position: absolute; left: 30px; top: 35px; width: 95px; height: 40px; background: var(--cannon-color); border: 3px solid #1e272e; border-radius: 5px 15px 15px 5px; transform-origin: left center; }
        #cannon-base { position: absolute; left: 0; top: 15px; width: 75px; height: 75px; background: #222; border-radius: 50%; border: 4px solid #111; z-index: 11; }
        
        .monster { position: absolute; width: 85px; height: 85px; z-index: 4; }
        .m-body { position: absolute; width: 100%; height: 100%; background: #111; border-radius: 50%; box-shadow: 0 0 0 2px #111, 5px 5px 0 -1px #111, -5px 5px 0 -1px #111, 5px -5px 0 -1px #111, -5px -5px 0 -1px #111, 8px 0 0 -2px #111, -8px 0 0 -2px #111, 0 8px 0 -2px #111, 0 -8px 0 -2px #111; transform-origin: center center; }
        .m-face { position: absolute; width: 100%; height: 100%; transform-origin: center 40%; }
        .m-leg { position: absolute; width: 4px; background: #111; border-radius: 2px; transform-origin: top center; }
        .m-leg.l { left: 30px; animation: mWalkL 0.2s infinite alternate; }
        .m-leg.r { right: 30px; animation: mWalkR 0.2s infinite alternate; animation-delay: 0.1s; }
        @keyframes mWalkL { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(-5px) rotate(12deg); } }
        @keyframes mWalkR { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(-5px) rotate(-12deg); } }

        .m-eye { position: absolute; background: white; transition: 0.2s; }
        .m-eye::after { content: ''; position: absolute; background: black; border-radius: 50%; }
        .m-mouth { position: absolute; left: 50%; transform: translateX(-50%); background: transparent; transition: 0.2s; }
        
        .m-type-0 .m-eye { top: 22px; width: 28px; height: 28px; border-radius: 50%; }
        .m-type-0 .m-eye.l { left: 12px; } .m-type-0 .m-eye.r { right: 12px; }
        .m-type-0 .m-eye::after { top: 10px; left: 10px; width: 7px; height: 7px; }
        .m-type-0 .m-mouth { bottom: 18px; width: 20px; height: 10px; border: 3px solid white; border-radius: 50% 50% 10% 10%; border-bottom: none; }
        
        .m-type-1 .m-eye { top: 26px; width: 28px; height: 20px; border-radius: 0 0 15px 15px; }
        .m-type-1 .m-eye.l { left: 10px; transform: rotate(15deg); } .m-type-1 .m-eye.r { right: 10px; transform: rotate(-15deg); }
        .m-type-1 .m-eye::after { top: 4px; left: 10px; width: 8px; height: 8px; }
        .m-type-1 .m-mouth { bottom: 16px; width: 16px; height: 6px; border: 3px solid white; background: white; border-radius: 4px; }
        
        .m-type-2 .m-eye { top: 28px; width: 26px; height: 14px; border-radius: 15px 15px 0 0; }
        .m-type-2 .m-eye.l { left: 14px; } .m-type-2 .m-eye.r { right: 14px; }
        .m-type-2 .m-eye::after { top: 4px; left: 9px; width: 6px; height: 6px; }
        .m-type-2 .m-mouth { bottom: 14px; width: 24px; height: 12px; border: 3px solid white; border-top: none; border-radius: 10% 10% 50% 50%; }
        
        .m-type-3 .m-eye.l { top: 15px; left: 8px; width: 35px; height: 35px; border-radius: 50%; }
        .m-type-3 .m-eye.l::after { top: 16px; left: 16px; width: 9px; height: 9px; }
        .m-type-3 .m-eye.r { top: 30px; right: 15px; width: 18px; height: 18px; border-radius: 50%; }
        .m-type-3 .m-eye.r::after { top: 6px; left: 6px; width: 5px; height: 5px; }
        .m-type-3 .m-mouth { bottom: 16px; width: 12px; height: 16px; border-radius: 50%; background: white; }

        .bullet { position: absolute; width: 34px; height: 22px; background: #f1c40f; border-radius: 50%; box-shadow: 0 0 15px #f39c12; z-index: 6; }
    </style>
</head>
<body>

<div id="scale-container">
    <div id="game-wrapper">
        
        <div id="sys-buttons">
            <div id="pause-btn" class="icon-btn" style="display:none;" onclick="togglePause()">
                <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
            <div id="mute-btn" class="icon-btn">
                <svg id="icon-unmute" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <svg id="icon-mute" viewBox="0 0 24 24" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            </div>
            <div id="fullscreen-btn" class="icon-btn">
                <svg id="icon-enter" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                <svg id="icon-exit" viewBox="0 0 24 24" style="display:none;"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
            </div>
        </div>

        <div id="start-screen" class="overlay-screen">
            <div class="overlay-title" style="color: #f1c40f;">大砲算術守衛戰</div>
            <div class="overlay-text">請選擇防守模式，保護城牆！</div>
            <div class="mode-grid">
                <button class="mode-btn add" onclick="startGame(1)">10以內 加法</button>
                <button class="mode-btn add" onclick="startGame(2)">20以內 加法</button>
                <button class="mode-btn sub" onclick="startGame(3)">10以內 減法</button>
                <button class="mode-btn sub" onclick="startGame(4)">20以內 減法</button>
                <button class="mode-btn inf" onclick="startGame(5)">🔥 無限綜合模式 🔥</button>
            </div>
        </div>

        <div id="pause-screen" class="overlay-screen" style="display: none;">
            <div class="overlay-title" style="color: #3498db;">遊戲暫停</div>
            <div class="overlay-text">休息一下，喝口水吧！</div>
            <button class="big-btn primary" onclick="togglePause()">繼續遊戲</button>
            <button class="big-btn danger" onclick="location.reload()">回到首頁</button>
        </div>

        <div id="victory-screen" class="overlay-screen" style="display: none;">
            <div class="overlay-title" style="color: #2ecc71;">恭喜過關！</div>
            <div class="overlay-text">你成功守護了城牆，數學太棒了！</div>
            <button class="big-btn primary" onclick="location.reload()">回到首頁</button>
        </div>

        <div id="gameover-screen" class="overlay-screen" style="display: none;">
            <div class="overlay-title" style="color: #ff4757;">防線崩潰...</div>
            <div class="overlay-text" id="final-kills"></div>
            <button class="big-btn" onclick="location.reload()">回到首頁</button>
        </div>

        <div id="controls-layout">
            <div id="fire-group">
                <button id="fire-btn" disabled>FIRE</button>
                <div id="bullet-info-badge">
                    <div class="bullet-icon"></div>
                    <span id="bullet-num">0</span>
                </div>
            </div>
            <div id="missile-area">
                <button id="missile-btn" disabled>
                    <svg viewBox="0 0 100 100" width="80" height="80">
                        <path d="M20 50 Q 5 40 5 50 Q 5 60 20 50" fill="#f1c40f" />
                        <path d="M25 50 Q 15 45 15 50 Q 15 55 25 50" fill="#e67e22" />
                        <rect x="30" y="40" width="40" height="20" rx="2" fill="#ff4757" />
                        <path d="M70 40 L 90 50 L 70 60 Z" fill="#f1c40f" />
                        <path d="M30 40 L 20 30 L 30 50 L 20 70 L 30 60 Z" fill="#c0392b" />
                        <rect x="40" y="43" width="20" height="2" fill="rgba(255,255,255,0.3)" />
                    </svg>
                </button>
                <div id="charge-dots">
                    <div class="dot" style="top:4px; left:0px;"></div>
                    <div class="dot" style="top:25px; left:15px;"></div>
                    <div class="dot" style="top:50px; left:22px;"></div>
                    <div class="dot" style="top:75px; left:15px;"></div>
                    <div class="dot" style="top:96px; left:0px;"></div>
                </div>
            </div>
        </div>
        
        <div id="battle-scene">
            <div id="score-board">KILLS: <span id="kills-text">0 / 50</span></div>
            <div class="wall"></div>
            <div id="cannon-container">
                <div id="cannon-barrel"></div>
                <div id="cannon-base"></div>
            </div>
        </div>

        <div id="ui-side-panel">
            <div style="font-size: 24px; opacity: 0.7;">挑戰題目</div>
            <div id="question-display">?</div>
            <div class="options-list" id="options"></div>
        </div>
    </div>
</div>

<script>
const CONFIG = {
    w: 1280, h: 720, battleW: 960,
    bulletSpeed: 28,
    initialSpawnInterval: 4000,
    minSpawnInterval: 1000,
    initialMonsterSpeed: 0.07,
    winKills: 50
};

let state = {
    kills: 0, bullets: 0, monsters: [], activeBullets: [],
    currentAns: null, isGameOver: false, isVictory: false, cannonAngle: 0,
    gameMode: 1, gameActive: false, missileCharge: 0, missileReady: false,
    walkTimer: 0, isMuted: false, isPaused: false // 【新增】暫停狀態
};

function resize() {
    const container = document.getElementById('scale-container');
    const scale = Math.min(window.innerWidth / CONFIG.w, window.innerHeight / CONFIG.h);
    container.style.transform = `scale(${scale})`;
}
window.onresize = resize; resize();

const fsBtn = document.getElementById('fullscreen-btn');
fsBtn.onclick = () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
};
document.addEventListener('fullscreenchange', () => {
    document.getElementById('icon-enter').style.display = document.fullscreenElement ? 'none' : 'block';
    document.getElementById('icon-exit').style.display = document.fullscreenElement ? 'block' : 'none';
});

const muteBtn = document.getElementById('mute-btn');
const iconUnmute = document.getElementById('icon-unmute');
const iconMute = document.getElementById('icon-mute');
muteBtn.onclick = () => {
    state.isMuted = !state.isMuted;
    iconUnmute.style.display = state.isMuted ? 'none' : 'block';
    iconMute.style.display = state.isMuted ? 'block' : 'none';
    if (!state.isMuted && audioCtx.state === 'suspended' && !state.isPaused) {
        audioCtx.resume();
    }
};

// --- 【新增】暫停功能控制 ---
function togglePause() {
    if (!state.gameActive || state.isGameOver || state.isVictory) return;
    
    state.isPaused = !state.isPaused;
    const pauseScreen = document.getElementById('pause-screen');
    
    if (state.isPaused) {
        pauseScreen.style.display = 'flex';
        // 暫停時掛起音頻引擎，BGM與所有音效會瞬間停止
        if (audioCtx.state === 'running') audioCtx.suspend(); 
    } else {
        pauseScreen.style.display = 'none';
        // 恢復時，若非靜音狀態則重新喚醒音頻引擎
        if (!state.isMuted && audioCtx.state === 'suspended') audioCtx.resume();
    }
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let bgmInterval = null;

function playSFX(type) {
    if (state.isMuted || state.isPaused) return; // 暫停時不播放音效
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const t = audioCtx.currentTime;

    switch(type) {
        case 'fire': 
            osc.type = 'square';
            osc.frequency.setValueAtTime(450, t);
            osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
            gain.gain.setValueAtTime(0.1, t); 
            gain.gain.linearRampToValueAtTime(0, t + 0.1);
            osc.start(t); osc.stop(t + 0.1);
            break;
        case 'spawn': 
            osc.type = 'sine';
            osc.frequency.setValueAtTime(250, t);
            osc.frequency.exponentialRampToValueAtTime(600, t + 0.15);
            osc.frequency.exponentialRampToValueAtTime(300, t + 0.3);
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.15, t + 0.1); 
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
            osc.start(t); osc.stop(t + 0.3);
            break;
        case 'die': 
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, t);
            osc.frequency.exponentialRampToValueAtTime(80, t + 0.5); 
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.type = 'sine'; lfo.frequency.value = 18; lfoGain.gain.value = 50; 
            lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
            gain.gain.setValueAtTime(0.05, t); 
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
            lfo.start(t); lfo.stop(t + 0.5);
            osc.start(t); osc.stop(t + 0.5);
            break;
        case 'walk':
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(700, t); 
            osc.frequency.exponentialRampToValueAtTime(300, t + 0.04);
            gain.gain.setValueAtTime(0.06, t); 
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
            osc.start(t); osc.stop(t + 0.04); 
            break;
        case 'correct': 
            osc.type = 'square';
            osc.frequency.setValueAtTime(659.25, t);
            gain.gain.setValueAtTime(0.08, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.1);
            osc.start(t); osc.stop(t + 0.1);
            break;
        case 'wrong': 
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, t);
            gain.gain.setValueAtTime(0.1, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.3);
            osc.start(t); osc.stop(t + 0.3);
            break;
        case 'victory': 
            const notes = [261.63, 329.63, 392.00, 523.25, 659.25];
            notes.forEach((freq, i) => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = 'square'; o.frequency.value = freq;
                o.connect(g); g.connect(audioCtx.destination);
                g.gain.setValueAtTime(0, t + i*0.12);
                g.gain.linearRampToValueAtTime(0.08, t + i*0.12 + 0.05);
                g.gain.linearRampToValueAtTime(0, t + i*0.12 + 0.5);
                o.start(t + i*0.12); o.stop(t + i*0.12 + 0.5);
            });
            break;
        case 'gameover': 
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, t);
            osc.frequency.linearRampToValueAtTime(40, t + 1.5);
            gain.gain.setValueAtTime(0.15, t);
            gain.gain.linearRampToValueAtTime(0, t + 1.5);
            osc.start(t); osc.stop(t + 1.5);
            break;
    }
}

function startBGM() {
    if (bgmInterval) return;
    const melody = [
        261.6, 0, 329.6, 0, 392.0, 0, 523.3, 0, 
        440.0, 0, 392.0, 0, 329.6, 0, 392.0, 0,
        349.2, 0, 329.6, 0, 293.7, 0, 392.0, 0, 
        261.6, 0, 196.0, 0, 261.6, 329.6, 392.0, 0,
        440.0, 440.0, 523.3, 440.0, 392.0, 0, 329.6, 0,
        349.2, 349.2, 440.0, 349.2, 329.6, 0, 261.6, 0,
        293.7, 293.7, 349.2, 293.7, 261.6, 0, 196.0, 0,
        261.6, 329.6, 392.0, 523.3, 261.6, 0, 0, 0
    ];
    let step = 0;
    bgmInterval = setInterval(() => {
        if (state.isMuted || state.isPaused) return; // 暫停時不排程新音符
        if (audioCtx.state === 'suspended') return;
        const freq = melody[step % melody.length];
        step++;
        if (!freq) return; 
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square'; 
        osc.frequency.value = freq;
        osc.connect(gain); gain.connect(audioCtx.destination);
        const t = audioCtx.currentTime;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.05, t + 0.02); 
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.start(t); osc.stop(t + 0.2);
    }, 200); 
}

function stopBGM() {
    if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

function startGame(mode) {
    if (audioCtx.state === 'suspended' && !state.isMuted) audioCtx.resume();
    state.gameMode = mode; state.gameActive = true;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('pause-btn').style.display = 'flex'; // 顯示暫停按鈕
    updateUI(); 
    startBGM(); 
    nextQ(); spawn(); loop();
}

function nextQ() {
    if(state.isGameOver || state.isVictory || state.isPaused) return;
    
    let a, b, ans, op;
    let currentMode = state.gameMode;
    if (currentMode === 5) {
        currentMode = Math.floor(Math.random() * 4) + 1;
    }

    if (currentMode === 1) {
        ans = Math.floor(Math.random() * 9) + 2;
        a = Math.floor(Math.random() * (ans - 1)) + 1;
        b = ans - a;
        op = '+';
    } else if (currentMode === 2) {
        a = Math.floor(Math.random() * 9) + 2; 
        b = Math.floor(Math.random() * 9) + 2;
        while (a + b < 10 || a + b > 20) { 
            a = Math.floor(Math.random() * 9) + 2; 
            b = Math.floor(Math.random() * 9) + 2; 
        }
        ans = a + b;
        op = '+';
    } else if (currentMode === 3) {
        a = Math.floor(Math.random() * 9) + 2; 
        b = Math.floor(Math.random() * (a - 1)) + 1; 
        ans = a - b;
        op = '-';
    } else if (currentMode === 4) {
        a = Math.floor(Math.random() * 9) + 11; 
        b = Math.floor(Math.random() * 8) + 2;  
        while (a - b < 1 || a - b > 9) { 
            a = Math.floor(Math.random() * 9) + 11;
            b = Math.floor(Math.random() * 8) + 2;
        }
        ans = a - b;
        op = '-';
    }

    state.currentAns = ans;
    document.getElementById('question-display').innerText = `${a} ${op} ${b}`;
    
    let opts = new Set([ans]);
    while(opts.size < 4) {
        let off = (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random()*3)+1);
        if (ans + off >= 0) opts.add(ans + off);
    }
    const container = document.getElementById('options');
    container.innerHTML = '';
    [...opts].sort(()=>Math.random()-0.5).forEach(v => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn'; btn.innerText = v;
        btn.onclick = () => {
            if (state.isPaused) return; // 暫停時按鈕無效
            if (v === state.currentAns) {
                state.bullets = Math.min(20, state.bullets + 1); 
                state.missileCharge = Math.min(5, state.missileCharge + 1);
                updateUI(); playSFX('correct'); nextQ();
            } else {
                state.missileCharge = 0; updateUI(); playSFX('wrong');
            }
        };
        container.appendChild(btn);
    });
}

function spawn() {
    if (state.isGameOver || state.isVictory || !state.gameActive) return;
    
    if (state.isPaused) {
        // 暫停時推遲生成時間，不直接退出
        setTimeout(spawn, 500); 
        return;
    }

    playSFX('spawn'); 
    const type = Math.floor(Math.random() * 4);
    const baseScale = (Math.random() * 0.2 + 0.4).toFixed(2);
    const bodyScaleX = (Math.random() * 0.6 + 0.7).toFixed(2);
    const bodyScaleY = (Math.random() * 0.6 + 0.7).toFixed(2);
    const faceScale = (Math.random() * 0.4 + 0.8).toFixed(2);
    const legBottom = (-15 - (85 * (bodyScaleY - 1) / 2)).toFixed(2);
    const legHeight = (18 * Math.max(1, bodyScaleY)).toFixed(2);
    
    const mSpeed = CONFIG.initialMonsterSpeed + (state.kills * 0.015);
    const legDur = Math.max(0.08, 0.05 / mSpeed).toFixed(2);
    const legDelay = -legDur;
    
    const m = {
        id: Date.now(), x: CONFIG.battleW, 
        y: 480 + Math.random() * 170, 
        speed: mSpeed, 
        el: document.createElement('div')
    };
    
    m.el.className = `monster m-type-${type}`; 
    m.el.style.transform = `scale(${baseScale})`;
    
    m.el.innerHTML = `
        <div class="m-body" style="transform: scale(${bodyScaleX}, ${bodyScaleY});"></div>
        <div class="m-face" style="transform: scale(${faceScale});">
            <div class="m-eye l"></div><div class="m-eye r"></div>
            <div class="m-mouth"></div>
        </div>
        <div class="m-leg l" style="bottom: ${legBottom}px; height: ${legHeight}px; animation-duration: ${legDur}s;"></div>
        <div class="m-leg r" style="bottom: ${legBottom}px; height: ${legHeight}px; animation-duration: ${legDur}s; animation-delay: ${legDelay}s;"></div>
    `;

    document.getElementById('battle-scene').appendChild(m.el);
    state.monsters.push(m);
    let nextDelay = Math.max(CONFIG.minSpawnInterval, CONFIG.initialSpawnInterval - (state.kills * 40));
    setTimeout(spawn, nextDelay);
}

document.getElementById('fire-btn').onclick = () => {
    if (state.isPaused) return; // 暫停時無效
    if (state.bullets > 0 && state.monsters.length > 0) {
        state.bullets--; updateUI(); playSFX('fire'); 
        const target = [...state.monsters].sort((a,b)=>a.x - b.x)[0];
        const startX = 310 + Math.cos(state.cannonAngle) * 95 - 17;
        const startY = 275 + Math.sin(state.cannonAngle) * 95 - 11; 
        const b = { x: startX, y: startY, target: target, el: document.createElement('div') };
        b.el.className = 'bullet'; 
        b.el.style.transform = `rotate(${state.cannonAngle}rad)`;
        document.getElementById('battle-scene').appendChild(b.el);
        state.activeBullets.push(b);
    }
};

document.getElementById('missile-btn').onclick = () => {
    if (state.isPaused) return; // 暫停時無效
    if (state.missileReady && state.monsters.length > 0) {
        state.missileReady = false; state.missileCharge = 0; updateUI();
        const wrapper = document.getElementById('game-wrapper');
        wrapper.classList.add('shake-effect');
        playSFX('fire'); 
        
        const target = [...state.monsters].sort((a,b)=>a.x - b.x)[0];
        const dx = target.x - 310; const dy = target.y - 275;
        const mAngle = Math.atan2(dy, dx);

        const mEl = document.createElement('div');
        mEl.className = 'big-missile'; 
        let mX = 310 + Math.cos(mAngle) * 95 - 60;
        let mY = 275 + Math.sin(mAngle) * 95 - 23;
        mEl.style.left = mX + 'px'; mEl.style.top = mY + 'px';
        mEl.style.transform = `rotate(${mAngle}rad)`; 
        document.getElementById('battle-scene').appendChild(mEl);
        
        let targetHitX = target.x;
        const speed = 15; 

        const mInterval = setInterval(() => {
            if (state.isPaused) return; // 飛彈在空中凍結

            mX += Math.cos(mAngle) * speed; 
            mY += Math.sin(mAngle) * speed;
            mEl.style.left = mX + 'px'; mEl.style.top = mY + 'px';
            
            if (mX >= targetHitX || mX > 1000 || mY > 800 || mY < 0) {
                clearInterval(mInterval); 
                if(mEl.parentNode) mEl.remove();
                wrapper.classList.remove('shake-effect');
                
                const flash = document.createElement('div');
                flash.style = "position:absolute; top:0; left:0; width:100%; height:100%; background:white; z-index:500; opacity:0.6;";
                document.getElementById('battle-scene').appendChild(flash);
                setTimeout(() => flash.remove(), 80);
                
                const toKill = state.monsters.sort((a,b)=>a.x - b.x).slice(0, 10);
                toKill.forEach(m => {
                    m.el.style.transform = 'scale(0.6) rotate(15deg)'; 
                    m.el.style.opacity = '0';
                    setTimeout(() => { if(m.el.parentNode) m.el.remove(); }, 300);
                    state.monsters.splice(state.monsters.indexOf(m), 1); 
                    addKill(); 
                });
                
                confetti({ particleCount: 180, spread: 100, origin: { x: (targetHitX / 1280), y: (mY / 720) } });
            }
        }, 16);
    }
};

function addKill() {
    if (state.isVictory || state.isGameOver) return;
    state.kills++;
    updateUI();
    playSFX('die'); 
    
    if (state.gameMode !== 5 && state.kills >= CONFIG.winKills) {
        triggerVictory();
    }
}

function loop() {
    if (state.isGameOver || state.isVictory || !state.gameActive) return;
    
    // --- 【更新】如果遊戲暫停，跳過所有物理與移動邏輯，達成畫面凍結 ---
    if (!state.isPaused) {
        if (state.monsters.length > 0) {
            const target = [...state.monsters].sort((a,b)=>a.x - b.x)[0];
            const legDur = Math.max(0.08, 0.05 / target.speed);
            const walkPace = legDur * 60; 
            
            state.walkTimer++;
            if (state.walkTimer >= walkPace) {
                playSFX('walk');
                state.walkTimer = 0;
            }

            const dx = (target.x + 42) - 310; 
            const dy = (target.y + 42) - 275; 
            state.cannonAngle = Math.atan2(dy, dx);
            document.getElementById('cannon-barrel').style.transform = `rotate(${state.cannonAngle}rad)`;
        }

        state.monsters.forEach(m => {
            m.x -= m.speed; m.el.style.left = m.x + 'px'; m.el.style.top = m.y + 'px';
            if (m.x <= 140) die(); 
        });

        for (let i = state.activeBullets.length-1; i>=0; i--) {
            const b = state.activeBullets[i];
            let tx = b.x + 100, ty = b.y;
            if (state.monsters.includes(b.target)) { tx = b.target.x + 42; ty = b.target.y + 42; }
            const dx = tx - b.x, dy = ty - b.y; const angle = Math.atan2(dy, dx);
            b.x += Math.cos(angle) * CONFIG.bulletSpeed; b.y += Math.sin(angle) * CONFIG.bulletSpeed;
            b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px'; b.el.style.transform = `rotate(${angle}rad)`;
            
            state.monsters.forEach((m, mIdx) => {
                const d = Math.sqrt(Math.pow(b.x-(m.x+42),2) + Math.pow(b.y-(m.y+42),2));
                if (d < 25) { 
                    if (m.el.parentNode) m.el.remove(); state.monsters.splice(mIdx, 1);
                    if (b.el.parentNode) b.el.remove(); state.activeBullets.splice(i, 1);
                    addKill(); 
                }
            });
        }
    }
    requestAnimationFrame(loop);
}

function updateUI() {
    document.getElementById('kills-text').innerText = state.gameMode === 5 ? state.kills : `${state.kills} / ${CONFIG.winKills}`;
    document.getElementById('bullet-num').innerText = state.bullets;
    document.getElementById('bullet-num').style.color = (state.bullets >= 20) ? '#ff4757' : '#f1c40f';
    document.getElementById('fire-btn').disabled = (state.bullets <= 0);
    const dots = document.querySelectorAll('.dot');
    dots.forEach((dot, i) => {
        dot.style.background = i < state.missileCharge ? '#2ecc71' : '#333';
        dot.style.boxShadow = i < state.missileCharge ? '0 0 8px #2ecc71' : 'none';
    });
    state.missileReady = (state.missileCharge === 5);
    const mBtn = document.getElementById('missile-btn');
    mBtn.classList.toggle('ready', state.missileReady); mBtn.disabled = !state.missileReady;
}

function triggerVictory() {
    state.isVictory = true;
    document.getElementById('pause-btn').style.display = 'none'; // 隱藏暫停按鈕
    stopBGM(); 
    playSFX('victory'); 
    
    state.monsters.forEach(m => { if(m.el.parentNode) m.el.remove(); });
    state.monsters = [];
    
    const duration = 3000;
    const end = Date.now() + duration;
    (function frame() {
        confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff4757', '#2ecc71', '#f1c40f'] });
        confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff4757', '#2ecc71', '#f1c40f'] });
        if (Date.now() < end) requestAnimationFrame(frame);
    }());

    document.getElementById('victory-screen').style.display = 'flex';
}

function die() {
    state.isGameOver = true; 
    document.getElementById('pause-btn').style.display = 'none'; // 隱藏暫停按鈕
    stopBGM(); 
    playSFX('gameover'); 
    
    let killText = state.gameMode === 5 ? `最終擊殺數: ${state.kills}` : `最終擊殺數: ${state.kills} / 50`;
    document.getElementById('final-kills').innerText = killText;
    
    document.getElementById('gameover-screen').style.display = 'flex';
}
</script>
</body>
</html>
